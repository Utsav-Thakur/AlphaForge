  <!-- Futuristic Hexagonal Forge Boundary -->
  <polygon points="32,6 56,20 56,48 32,60 8,48 8,20" stroke="url(#grad1)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.35" />
  
