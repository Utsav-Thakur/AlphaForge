  <path d="M14 20C20 28 30 36 38 42C44 46 50 42 48 34L44 18M44 18L32 22M44 18L48 30" stroke="url(#grad2)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonGlow)" />
  
